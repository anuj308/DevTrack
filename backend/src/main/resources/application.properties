spring.application.name=backend
# PostgreSQL configuration (use Supabase connection string via DB_URL env var)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devtrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=your-super-secret-key-change-this-in-production-at-least-256-bits
app.jwt.expiration=86400000